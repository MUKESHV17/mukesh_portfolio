services:
  - type: web
    name: mukesh-portfolio-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
        placeholder: "Insert your MongoDB Atlas connection string here"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: EMAIL_USER
        sync: false
        placeholder: "Your Gmail account address (e.g. mukesh631701@gmail.com)"
      - key: EMAIL_PASS
        sync: false
        placeholder: "Your Gmail App Password (16 characters)"
      - key: CONTACT_RECEIVER
        value: mukesh631701@gmail.com
      - key: DEFAULT_ADMIN_USER
        value: admin
      - key: DEFAULT_ADMIN_PASS
        value: MukeshCyber2026!
      - key: DEFAULT_ADMIN_EMAIL
        value: mukesh631701@gmail.com
